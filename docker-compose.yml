version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: competitor_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: competitor_analysis_db
    ports:
      - "5433:5432" # Changed external port to 5433
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data # New volume name

volumes:
  postgres_data_v2: